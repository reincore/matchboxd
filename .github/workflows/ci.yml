name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        env:
          VITE_LETTERBOXD_PROXY_MODE: ${{ vars.VITE_LETTERBOXD_PROXY_MODE || 'auto' }}
          VITE_LETTERBOXD_PROXY_BASE_URL: ${{ vars.VITE_LETTERBOXD_PROXY_BASE_URL || vars.VITE_RSS_BASE_URL }}
          VITE_ENABLE_PUBLIC_PROXY_FALLBACKS: ${{ vars.VITE_ENABLE_PUBLIC_PROXY_FALLBACKS || 'false' }}
          VITE_APP_BASE_PATH: /
        run: npm run build
