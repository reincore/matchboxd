<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Matchboxd share preview">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300&amp;family=Inter:wght@400;700&amp;display=swap');
    </style>

    <!-- Base gradient: ink-950 → ink-900 (matches website body) -->
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#08090c"/>
      <stop offset="1" stop-color="#0c0e13"/>
    </linearGradient>

    <!--
      Atmospheric pink glows matching the website CSS:
      radial-gradient(1200px 600px at 20% -10%, rgba(236,72,153,0.08), transparent 60%)
      radial-gradient(900px 500px at 100% 20%, rgba(249,168,212,0.04), transparent 60%)
    -->
    <radialGradient id="glow-tl" cx="20%" cy="0%" r="60%">
      <stop offset="0" stop-color="#ec4899" stop-opacity="0.12"/>
      <stop offset="0.55" stop-color="#ec4899" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow-r" cx="95%" cy="25%" r="45%">
      <stop offset="0" stop-color="#f9a8d4" stop-opacity="0.06"/>
      <stop offset="0.55" stop-color="#f9a8d4" stop-opacity="0.01"/>
      <stop offset="1" stop-color="#f9a8d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background layers (matching website body gradient) -->
  <rect width="1200" height="630" fill="url(#base)"/>
  <rect width="1200" height="630" fill="url(#glow-tl)"/>
  <rect width="1200" height="630" fill="url(#glow-r)"/>

  <!-- ── Left zone: oversized 2-circle mark ── -->
  <!--
    r=130, cx1=200, cx2=360, cy=315, d=160.
    Intersection x=280, y=±√(16900−6400)=±√10500≈±102.47 → 212.53 and 417.47.
  -->
  <circle cx="200" cy="315" r="130" fill="#ec4899" fill-opacity="0.48"/>
  <circle cx="360" cy="315" r="130" fill="#ec4899" fill-opacity="0.24"/>
  <path d="M 280 212.53 A 130 130 0 0 1 280 417.47 A 130 130 0 0 1 280 212.53 Z"
        fill="#ec4899" fill-opacity="0.80"/>

  <!-- Thin vertical divider (ink-600 opacity) -->
  <line x1="540" y1="90" x2="540" y2="540"
        stroke="#ec4899" stroke-width="0.75" stroke-opacity="0.18"/>

  <!-- ── Right zone: text ── -->

  <!-- Wordmark (font-display: Fraunces 300, matching logo.svg) -->
  <text x="590" y="213"
        font-family="Fraunces, Georgia, 'Times New Roman', serif"
        font-size="90"
        font-weight="300"
        letter-spacing="-1.8"
        fill="#e5e8f2">Matchboxd</text>

  <!-- Tagline (font-sans: Inter 700, accent-soft) -->
  <text x="592" y="258"
        font-family="Inter, system-ui, Arial, sans-serif"
        font-size="16"
        font-weight="700"
        letter-spacing="4.2"
        fill="#f9a8d4">STOP SCROLLING. START WATCHING.</text>

  <!-- Thin accent rule -->
  <line x1="590" y1="284" x2="920" y2="284"
        stroke="#ec4899" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Description (font-sans: Inter 400, ink-100) -->
  <text x="590" y="345"
        font-family="Inter, system-ui, Arial, sans-serif"
        font-size="30"
        font-weight="400"
        fill="#e5e8f2">Movies you both want to watch,</text>

  <text x="590" y="387"
        font-family="Inter, system-ui, Arial, sans-serif"
        font-size="30"
        font-weight="400"
        fill="#e5e8f2">with ratings and where to stream.</text>

  <!-- URL (font-sans: Inter 400, ink-300) -->
  <text x="590" y="487"
        font-family="Inter, system-ui, Arial, sans-serif"
        font-size="21"
        font-weight="400"
        fill="#858ca3">matchboxd.com</text>
</svg>
