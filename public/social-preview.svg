<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Matchboxd share preview">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300&amp;family=Inter:wght@400;500;700&amp;display=swap');
    </style>

    <!-- Base gradient: ink-950 → ink-900 (matches website body) -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#08090c"/>
      <stop offset="1" stop-color="#0c0e13"/>
    </linearGradient>

    <!-- Strong atmospheric pink glows (matching Screenshot2 background) -->
    <radialGradient id="glow-top" cx="35%" cy="0%" r="65%">
      <stop offset="0" stop-color="#ec4899" stop-opacity="0.30"/>
      <stop offset="0.35" stop-color="#ec4899" stop-opacity="0.14"/>
      <stop offset="0.65" stop-color="#ec4899" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-left" cx="10%" cy="30%" r="55%">
      <stop offset="0" stop-color="#db2777" stop-opacity="0.18"/>
      <stop offset="0.4" stop-color="#ec4899" stop-opacity="0.08"/>
      <stop offset="0.7" stop-color="#ec4899" stop-opacity="0.02"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="90%" cy="15%" r="50%">
      <stop offset="0" stop-color="#f9a8d4" stop-opacity="0.14"/>
      <stop offset="0.4" stop-color="#ec4899" stop-opacity="0.06"/>
      <stop offset="0.7" stop-color="#ec4899" stop-opacity="0.02"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-center" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#be185d" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#ec4899" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>

    <!-- Icon card background -->
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161925"/>
      <stop offset="1" stop-color="#0b0d12"/>
    </linearGradient>
    <radialGradient id="icon-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#ec4899" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="match-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#f9a8d4" stop-opacity="0.24"/>
      <stop offset="0.6" stop-color="#ec4899" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-top)"/>
  <rect width="1200" height="630" fill="url(#glow-left)"/>
  <rect width="1200" height="630" fill="url(#glow-right)"/>
  <rect width="1200" height="630" fill="url(#glow-center)"/>

  <!-- ── Icon card ── -->
  <g transform="translate(96 120)">
    <rect x="0" y="0" width="210" height="210" rx="46" fill="url(#card)"/>
    <rect x="0.5" y="0.5" width="209" height="209" rx="45.5"
          fill="none" stroke="#ec4899" stroke-width="1.5" stroke-opacity="0.35"/>

    <!-- Pink glow -->
    <ellipse cx="105" cy="105" rx="84" ry="64" fill="url(#icon-glow)"/>

    <!-- Film frame -->
    <rect x="35" y="59" width="140" height="92" rx="12"
          fill="none" stroke="#ec4899" stroke-width="4" stroke-opacity="0.60"/>

    <!-- Warm glow at the intersection -->
    <ellipse cx="105" cy="105" rx="22" ry="24" fill="url(#match-glow)"/>

    <!-- Left circle — User A -->
    <circle cx="90" cy="105" r="24" fill="#ec4899" fill-opacity="0.50"/>

    <!-- Right circle — User B (boosted for smoother blend) -->
    <circle cx="120" cy="105" r="24" fill="#ec4899" fill-opacity="0.32"/>

    <!--
      Intersection lens: cx1=90, cx2=120, r=24, d=30.
      x=105, y=±√(576−225)=±√351≈±18.74 → 86.26 and 123.74.
    -->
    <path d="M 105 86.26 A 24 24 0 0 1 105 123.74 A 24 24 0 0 1 105 86.26 Z"
          fill="#ec4899" fill-opacity="0.70"/>
  </g>

  <!-- ── Text block ── -->
  <g transform="translate(356 142)">
    <!-- Wordmark (font-display: Fraunces 300) -->
    <text x="0" y="122"
          font-family="Fraunces, Georgia, 'Times New Roman', serif"
          font-size="124"
          font-weight="300"
          letter-spacing="-2.4"
          fill="#f4f6fb">Matchboxd</text>

    <!-- Tagline (font-sans: Inter 700, accent-soft) -->
    <text x="0" y="204"
          font-family="Inter, system-ui, Arial, sans-serif"
          font-size="31"
          font-weight="700"
          letter-spacing="4.2"
          fill="#f9a8d4">STOP SCROLLING. START WATCHING.</text>

    <!-- Description (font-sans: Inter 500, ink-100) -->
    <text x="0" y="306"
          font-family="Inter, system-ui, Arial, sans-serif"
          font-size="48"
          font-weight="500"
          fill="#e5e8f2">Movies you both want to watch,</text>

    <text x="0" y="364"
          font-family="Inter, system-ui, Arial, sans-serif"
          font-size="48"
          font-weight="500"
          fill="#e5e8f2">with ratings and where to stream.</text>

    <!-- URL (font-sans: Inter 500, ink-300) -->
    <text x="0" y="458"
          font-family="Inter, system-ui, Arial, sans-serif"
          font-size="28"
          font-weight="500"
          fill="#858ca3">matchboxd.com</text>
  </g>
</svg>
