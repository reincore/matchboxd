<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#131620"/>
      <stop offset="1" stop-color="#08090c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#ec4899" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Glow -->
  <ellipse cx="256" cy="256" rx="208" ry="160" fill="url(#glow)"/>

  <!-- Film frame (64×64 coords × 8) -->
  <rect x="80" y="144" width="352" height="224" rx="32"
        fill="none" stroke="#ec4899" stroke-width="14.4" stroke-opacity="0.72"/>

  <!-- Left circle (cx=208, r=64) -->
  <circle cx="208" cy="256" r="64" fill="#ec4899" fill-opacity="0.50"/>

  <!-- Right circle (cx=304, r=64) -->
  <circle cx="304" cy="256" r="64" fill="#ec4899" fill-opacity="0.28"/>

  <!--
    Intersection: cx1=208, cx2=304, r=64, d=96.
    x=256, y=±√(4096−2304)=±√1792=±42.33 → 213.67 and 298.33.
  -->
  <path d="M 256 213.67 A 64 64 0 0 1 256 298.33 A 64 64 0 0 1 256 213.67 Z"
        fill="#ec4899" fill-opacity="0.78"/>
</svg>
