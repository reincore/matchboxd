<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#131620"/>
      <stop offset="1" stop-color="#08090c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#ec4899" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- App icon background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle pink glow behind the venn -->
  <ellipse cx="32" cy="32" rx="26" ry="20" fill="url(#glow)"/>

  <!-- Film frame -->
  <rect x="10" y="18" width="44" height="28" rx="4"
        fill="none" stroke="#ec4899" stroke-width="1.8" stroke-opacity="0.72"/>

  <!-- Left circle — User A (higher opacity) -->
  <circle cx="26" cy="32" r="8" fill="#ec4899" fill-opacity="0.50"/>

  <!-- Right circle — User B (lower opacity) -->
  <circle cx="38" cy="32" r="8" fill="#ec4899" fill-opacity="0.28"/>

  <!--
    Intersection lens — the "match" highlight.
    Circles: cx1=26, cx2=38, r=8, d=12.
    Intersection x = d/2 + cx1 = 32.
    Intersection y = ±√(r²−(d/2)²) = ±√(64−36) = ±5.292 → 26.708 and 37.292.
    Both arcs: r=8, sweep-flag=1 (clockwise), large-arc-flag=0.
  -->
  <path d="M 32 26.71 A 8 8 0 0 1 32 37.29 A 8 8 0 0 1 32 26.71 Z"
        fill="#ec4899" fill-opacity="0.78"/>
</svg>
