<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#131620"/>
      <stop offset="1" stop-color="#08090c"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Left circle — User A -->
  <circle cx="22" cy="32" r="14" fill="#ec4899" fill-opacity="0.52"/>

  <!-- Right circle — User B -->
  <circle cx="42" cy="32" r="14" fill="#ec4899" fill-opacity="0.26"/>

  <!--
    Intersection lens: cx1=22, cx2=42, r=14, d=20.
    x=32, y=±√(196−100)=±√96≈±9.80 → 22.20 and 41.80.
  -->
  <path d="M 32 22.20 A 14 14 0 0 1 32 41.80 A 14 14 0 0 1 32 22.20 Z"
        fill="#ec4899" fill-opacity="0.84"/>
</svg>
