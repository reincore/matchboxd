<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#131620"/>
      <stop offset="1" stop-color="#08090c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#ec4899" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="match-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#f9a8d4" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#ec4899" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>

  <!-- Glow -->
  <ellipse cx="96" cy="96" rx="78" ry="60" fill="url(#glow)"/>

  <!-- Film frame (scale ×3) -->
  <rect x="30" y="54" width="132" height="84" rx="12"
        fill="none" stroke="#ec4899" stroke-width="4.5" stroke-opacity="0.60"/>

  <!-- Warm glow at the intersection -->
  <ellipse cx="96" cy="96" rx="30" ry="24" fill="url(#match-glow)"/>

  <!-- Equal participants; overlap carries the strongest emphasis. -->
  <circle cx="78" cy="96" r="24" fill="#ec4899" fill-opacity="0.45"/>
  <circle cx="114" cy="96" r="24" fill="#ec4899" fill-opacity="0.45"/>

  <!--
    Intersection: cx1=78, cx2=114, r=24, d=36.
    x=96, y=±√(576−324)=±√252≈±15.87 → 80.13 and 111.87.
  -->
  <path d="M 96 80.13 A 24 24 0 0 1 96 111.87 A 24 24 0 0 1 96 80.13 Z"
        fill="#ec4899" fill-opacity="0.78"/>
</svg>
