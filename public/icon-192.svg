<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#131620"/>
      <stop offset="1" stop-color="#08090c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#ec4899" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>

  <!-- Glow -->
  <ellipse cx="96" cy="96" rx="78" ry="60" fill="url(#glow)"/>

  <!-- Film frame (64×64 coords × 3) -->
  <rect x="30" y="54" width="132" height="84" rx="12"
        fill="none" stroke="#ec4899" stroke-width="5.4" stroke-opacity="0.72"/>

  <!-- Left circle (cx=78, r=24) -->
  <circle cx="78" cy="96" r="24" fill="#ec4899" fill-opacity="0.50"/>

  <!-- Right circle (cx=114, r=24) -->
  <circle cx="114" cy="96" r="24" fill="#ec4899" fill-opacity="0.28"/>

  <!--
    Intersection: cx1=78, cx2=114, r=24, d=36.
    x=96, y=±√(576−324)=±√252=±15.875 → 80.125 and 111.875.
  -->
  <path d="M 96 80.13 A 24 24 0 0 1 96 111.87 A 24 24 0 0 1 96 80.13 Z"
        fill="#ec4899" fill-opacity="0.78"/>
</svg>
